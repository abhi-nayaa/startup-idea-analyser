<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Startup Idea Analyser</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-layout fade-in">
      <section class="auth-side">
        <p class="eyebrow">Welcome Back</p>
        <h1>Log in and continue building better startup ideas.</h1>
        <p>
          Access your dashboard, submit new concepts, and review analysis results in one place.
        </p>
      </section>

      <section class="auth-card">
        <div id="message-box" class="message-box hidden"></div>
        <form id="login-form" class="auth-form">
          <h2>Login</h2>
          <label for="login-email">Email</label>
          <div class="input-wrap">
            <input type="email" id="login-email" placeholder="you@example.com" required />
          </div>
          <p id="login-email-error" class="field-error hidden"></p>

          <label for="login-password">Password</label>
          <div class="input-wrap password-wrap">
            <input type="password" id="login-password" placeholder="Enter password" required />
            <button type="button" class="toggle-password" data-target="login-password" aria-label="Toggle password visibility">
              <span class="eye-icon" aria-hidden="true">&#128065;</span>
            </button>
          </div>
          <p id="login-password-error" class="field-error hidden"></p>

          <button type="submit" class="primary-button">Login</button>
        </form>
        <p class="hint">Need an account? <a class="text-link" href="./register.html">Register</a></p>
      </section>
    </main>

    <script src="./js/utils.js"></script>
    <script src="./js/auth.js"></script>
  </body>
</html>
